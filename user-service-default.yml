server:
  port: 8083

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/userdb
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

jwt:
  algorithm:
    key: ${JWT_KEY}
  issuer: ${JWT_ISSUER}
  expiration:
    time: ${JWT_EXPIRATION_TIME}
